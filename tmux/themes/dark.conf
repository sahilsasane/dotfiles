# Preserve the previous Mocha status line exactly.
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "basic"
set -g @catppuccin_status_left_separator ""
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"
run-shell ~/.tmux/plugins/catppuccin/catppuccin.tmux
set -g status-style "bg=default"
set -g status-left '#{?client_prefix,#[fg=#11111b,bg=#f9e2af,bold] 󰘳 PREFIX #[default],}#{?window_active,#{?synchronize-panes,#[fg=#11111b,bg=#fab387,bold] 󰓦 SYNC #[default],},}#{?session_many_attached,#[fg=#11111b,bg=#a6e3a1,bold] 󰖩 PAIR #[default],}#[fg=#cba6f7,bg=default,bold] 󰆍 #S #[default]'
set -g status-right "#[fg=#cdd6f4]%H:%M#[fg=#585b70] | #[default]#(/Users/sahilsasane/dotfiles/tmux/scripts/git-branch.sh '#{pane_current_path}') #(/Users/sahilsasane/dotfiles/tmux/scripts/battery.sh) #[fg=#585b70]| #[default]#(/Users/sahilsasane/dotfiles/tmux/scripts/memory-pressure.sh)#[fg=#585b70] | #[default]#(/Users/sahilsasane/dotfiles/tmux/scripts/app-icon.sh '#{pane_current_command}') "
set -g window-status-style "fg=#6c7086,bg=default"
set -g window-status-current-style "fg=#cba6f7,bg=default,bold"
set -g window-status-format "#[fg=#6c7086,bg=default] #I #W "
set -g window-status-current-format "#[fg=#6c7086,bg=default] #I#[fg=#cba6f7,bg=default,bold] #W "
set -g message-style "fg=#cdd6f4,bg=#1e1e2e"
set -g message-command-style "fg=#cdd6f4,bg=#1e1e2e"
set -g mode-style "fg=#1e1e2e,bg=#f9e2af"
set -g display-panes-active-colour "#89b4fa"
set -g display-panes-colour "#6c7086"
set -g pane-border-style fg=#585b70
set -g pane-active-border-style fg=#89b4fa
