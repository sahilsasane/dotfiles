# General Settings
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -as terminal-features ",xterm-ghostty:RGB:clipboard:ccolour:cstyle:focus:hyperlinks:osc7:title"
set -as terminal-overrides ",xterm-ghostty:Ss=\\E[%p1%d q:Se=\\E[6 q"
set -g mouse on

# Quick escape hatch: disable tmux mouse when you want native iTerm selection.
bind m if-shell -F '#{mouse}' 'set -g mouse off \; display-message "tmux mouse: off"' 'set -g mouse on \; display-message "tmux mouse: on"'

# Bind C-a to prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Start index at 1 (easier keyboard reach)
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Suggested optimizations
setw -g mode-keys vi
set -g history-limit 100000

bind Tab last-window
bind -n M-h previous-window
bind -n M-l next-window

# Reduce escape delay (important for Neovim)
set -sg escape-time 10
set -g focus-events on

# Key Bindings
# ============================================================
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'

# Catppuccin Theme
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Load catppuccin (must be before status bar config)
run-shell ~/.tmux/plugins/catppuccin/catppuccin.tmux

# Status Bar
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"

#extra
# Catppuccin Theme
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Better separators and status fill
set -g @catppuccin_status_left_separator ""
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"

# Better window tabs
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator ""
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "left"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_current_fill "number"

# tmux messages / copy mode
set -g message-style "fg=#cdd6f4,bg=#1e1e2e"
set -g message-command-style "fg=#cdd6f4,bg=#1e1e2e"
set -g mode-style "fg=#1e1e2e,bg=#f9e2af"

# Better pane display colors
set -g display-panes-active-colour "#89b4fa"
set -g display-panes-colour "#6c7086"


set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_directory}"
#extra

# Prevent shell from renaming windows to long paths
set -g allow-rename off

set -g allow-passthrough on

# Clean window titles
set -g window-status-format " #I #W "
set -g window-status-current-format " #I #W "

# Show session name on the left
set -g status-left " #S "

# Reduce right side clutter (optional but recommended)
set -g status-right "#{E:@catppuccin_status_session} #{E:@catppuccin_status_application}"

# Better pane borders with Catppuccin
set -g pane-border-style fg=#585b70
set -g pane-active-border-style fg=#89b4fa

run ~/.tmux/plugins/tmux-cpu/cpu.tmux
run ~/.tmux/plugins/tmux-battery/battery.tmux

# Initialize TPM
run '~/.tmux/plugins/tpm/tpm'
