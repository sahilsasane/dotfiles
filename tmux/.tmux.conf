# General settings
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -as terminal-features ",xterm-ghostty:RGB:clipboard:ccolour:cstyle:focus:hyperlinks:osc7:title"
set -as terminal-features ",xterm-kitty:RGB:clipboard:ccolour:cstyle:focus:hyperlinks:osc7:title"
set -as terminal-overrides ",xterm-ghostty:Ss=\\E[%p1%d q:Se=\\E[6 q"
set -as terminal-overrides ",xterm-kitty:Ss=\\E[%p1%d q:Se=\\E[6 q"
set -g mouse on
set -g focus-events on
set -s extended-keys on
set -as terminal-features ",xterm*:extkeys"
set -g allow-passthrough on
set -g allow-rename off
set -g history-limit 100000
set -sg escape-time 10
set -g remain-on-exit failed

# Quick escape hatch: disable tmux mouse temporarily when you want native terminal selection.
bind m if-shell -F '#{mouse}' 'set -g mouse off \; display-message "tmux mouse: off"' 'set -g mouse on \; display-message "tmux mouse: on"'

# Prefix keys
unbind C-b
set -g prefix C-a
bind C-a send-prefix
set -g prefix2 C-Space
bind C-Space send-prefix -2

# Start numbering at 1 and keep windows compact.
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set -g renumber-windows on
setw -g mode-keys vi
bind -Tcopy-mode MouseDragEnd1Pane send -X copy-selection-no-clear
bind -Tcopy-mode-vi MouseDragEnd1Pane send -X copy-selection-no-clear

# Pane and window navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind Tab last-window
bind -n M-h previous-window
bind -n M-l next-window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4

# Splits inherit the current pane directory.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Quality-of-life bindings
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"
bind b set-option status \; display-message "status toggled"
bind e choose-tree -Zw
bind P display-popup -E -d "#{pane_current_path}" -w 90% -h 85%
bind y if-shell -F '#{synchronize-panes}' 'set-window-option synchronize-panes off \; display-message "sync panes: off"' 'set-window-option synchronize-panes on \; display-message "sync panes: on"'

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux#v2.1.3'

# Theme and status line: use the installed runtime selector, with dark as a
# safe fallback while the installer has not yet created it.
set -g status-left-length 48
set -g status-right-length 150
set -g window-status-separator ""
set -g window-status-format " #I "
if-shell 'test -f ~/.config/dotfiles-theme/tmux.conf' 'source-file ~/.config/dotfiles-theme/tmux.conf' 'source-file /Users/sahilsasane/dotfiles/tmux/themes/dark.conf'

# Initialize TPM last so plugins are loaded.
run '~/.tmux/plugins/tpm/tpm'
